function formatMoney(n) { return n.toLocaleString('uz-UZ') + " so'm"; }
function formatDate(d) { if (!d) return '-'; const p = d.split('-'); return `${p[2]}.${p[1]}.${p[0]}`; }
function getInitials(name) { return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase(); }
function getCourse(id) { return courses.find(c => c.id === id); }
function getGroup(id) { return groups.find(g => g.id === id); }
function getTeacher(id) { return teachers.find(t => t.id === id); }
function getStudent(id) { return students.find(s => s.id === id); }
function getGroupCount(gid) { return students.filter(s => s.groupId === gid).length; }
function getCourseStudentCount(cid) { return students.filter(s => { const g = getGroup(s.groupId); return g && g.courseId === cid; }).length; }
function getCourseGroupCount(cid) { return groups.filter(g => g.courseId === cid).length; }

// ===== TOAST =====
function showToast(msg, type = 'success') {
    const colors = { success: 'bg-accent', error: 'bg-danger', warning: 'bg-warning', info: 'bg-blue-500' };
    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', warning: 'fa-exclamation-circle', info: 'fa-info-circle' };
    const el = document.createElement('div');
    el.className = `toast-enter pointer-events-auto flex items-center gap-3 ${colors[type]} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium`;
    el.innerHTML = `<i class="fa-solid ${icons[type]}"></i><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.style.transition = 'all 0.3s ease'; el.style.opacity = '0'; el.style.transform = 'translateX(100px)'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ===== CONFIRM =====
function showConfirm(title, text, cb) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-text').textContent = text;
    document.getElementById('confirm-dialog').classList.remove('hidden');
    confirmCallback = cb;
    document.getElementById('confirm-btn').onclick = () => { if (confirmCallback) confirmCallback(); hideConfirm(); };
}
function hideConfirm() { document.getElementById('confirm-dialog').classList.add('hidden'); confirmCallback = null; }

function showModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-backdrop').classList.remove('hidden');
}
function hideModal() { document.getElementById('modal-backdrop').classList.add('hidden'); }

// ===== DETAIL PANEL =====
function showDetailPanel(html) {
    document.getElementById('detail-panel').innerHTML = html;
    document.getElementById('detail-panel').className = 'fixed right-0 top-0 h-full w-full sm:w-[420px] bg-white shadow-2xl z-50 overflow-y-auto slide-in-right';

// ===== SIDEBAR =====
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    sb.classList.toggle('open');
    ov.classList.toggle('hidden');
}
function renderSidebar() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = menuItems.map(m => {
        const badge = m.id === 'students' ? `<span class="ml-auto bg-accent/20 text-accent text-xs px-2 py-0.5 rounded-full font-semibold">${students.length}</span>` : '';
        return `<button onclick="navigate('${m.id}')" class="sidebar-item w-full flex items-center gap-3 px-5 py-2.5 text-sm text-gray-400 ${currentPage === m.id ? 'active' : ''}">
            <i class="fa-solid ${m.icon} w-5 text-center text-[13px]"></i>
            <span>${m.label}</span>${badge}
        </button>`;
    }).join('');
}

// ===== BREADCRUMB =====
function renderBreadcrumb() {
    const item = menuItems.find(m => m.id === currentPage);
    document.getElementById('breadcrumb').innerHTML = `
        <span class="text-gray-400">EduCRM</span>
        <i class="fa-solid fa-chevron-right text-gray-300 text-[10px]"></i>
        <span class="text-gray-700 font-medium">${item ? item.label : ''}</span>
    `;
}

// ===== NAVIGATSIYA =====
function navigate(page) {
    currentPage = page;
    searchQuery = '';
    filters = { status: 'all', course: 'all', group: 'all', type: 'all' };
    const gs = document.getElementById('global-search');
    if (gs) gs.value = '';
    renderSidebar();
    renderBreadcrumb();
    renderContent();
    // Mobil uchun sidebar yopish
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.add('hidden');
}
function handleGlobalSearch(val) { searchQuery = val.toLowerCase(); renderContent(); }

// ===== KONTENT RENDER =====
function renderContent() {
    Object.values(chartInstances).forEach(c => c.destroy());
    chartInstances = {};
    const el = document.getElementById('content');
    switch (currentPage) {
        case 'dashboard': el.innerHTML = renderDashboard(); initDashboardCharts(); break;
        case 'students': el.innerHTML = renderStudents(); break;
        case 'groups': el.innerHTML = renderGroups(); break;
        case 'courses': el.innerHTML = renderCourses(); break;
        case 'payments': el.innerHTML = renderPayments(); break;
        case 'schedule': el.innerHTML = renderSchedule(); break;
        case 'teachers': el.innerHTML = renderTeachers(); break;
        default: el.innerHTML = renderDashboard(); initDashboardCharts();
    }
}

function initDashboardCharts() {
    // Daromad grafigi
    const rc = document.getElementById('revenueChart');
    if (!rc) return;
    const ctx1 = rc.getContext('2d');
    const gradient = ctx1.createLinearGradient(0, 0, 0, 250);
    gradient.addColorStop(0, 'rgba(0,176,116,0.25)');
    gradient.addColorStop(1, 'rgba(0,176,116,0.01)');
    chartInstances.revenue = new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ['Iyun', 'Iyul', 'Avgust', 'Sentabr', 'Oktyabr', 'Noyabr'],
            datasets: [{
                label: 'Daromad',
                data: [8200000, 10500000, 12300000, 14800000, 16200000, 18700000],
                backgroundColor: gradient,
                borderColor: '#00b074',
                borderWidth: 2,
                borderRadius: 8,
                borderSkipped: false,
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => formatMoney(ctx.raw) } } },
            scales: {
                x: { grid: { display: false }, ticks: { font: { size: 12, family: 'Inter' }, color: '#9ca3af' } },
                y: { grid: { color: '#f3f4f6' }, ticks: { font: { size: 11, family: 'Inter' }, color: '#9ca3af', callback: v => (v/1000000).toFixed(0) + 'M' }, border: { display: false } }
            }
        }
    });

    // Taqsimot grafigi
    const dc = document.getElementById('distributionChart');
    if (!dc) return;
    chartInstances.distribution = new Chart(dc.getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: courses.map(c => c.name),
            datasets: [{
                data: courses.map(c => getCourseStudentCount(c.id)),
                backgroundColor: courses.map(c => c.color),
                borderWidth: 0,
                spacing: 3,
                borderRadius: 4,
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            cutout: '68%',
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 11, family: 'Inter' }, color: '#6b7280', padding: 12, usePointStyle: true, pointStyleWidth: 8 } }
            }
        }
    });
}

function saveStudent(e, id) {
    e.preventDefault();
    const f = e.target;
    const data = {
        name: f.name.value.trim(),
        phone: f.phone.value.trim(),
        email: f.email.value.trim(),
        groupId: parseInt(f.groupId.value) || null,
        status: f.status.value,
        balance: parseInt(f.balance.value) || 0,
    };
    if (!data.name || !data.phone) { showToast('Ism va telefon majburiy', 'error'); return; }
    if (id) {
        const s = getStudent(id);
        if (s) Object.assign(s, data);
        showToast('Talaba muvaffaqiyatli tahrirlandi');
    } else {
        data.id = nextId.student++;
        data.joinDate = new Date().toISOString().split('T')[0];
        students.push(data);
        showToast('Yangi talaba muvaffaqiyatli qo\'shildi');
    }
    hideModal();
    renderSidebar();
    renderContent();
}

function confirmDeleteStudent(id) {
    const s = getStudent(id);
    showConfirm('Talabani o\'chirish', `"${s.name}" talabasini o'chirishni xohlaysizmi? Bu amalni qaytarib bo'lmaydi.`, () => {
        students = students.filter(st => st.id !== id);
        payments = payments.filter(p => p.studentId !== id);
        showToast('Talaba muvaffaqiyatli o\'chirildi');
        renderSidebar();
        renderContent();
    });
}

function showStudentDetail(id) {
    const s = getStudent(id);
    if (!s) return;

function saveGroup(e, id) {
    e.preventDefault();
    const f = e.target;
    const days = [...f.querySelectorAll('input[name="days"]:checked')].map(c => c.value);
    const data = {
        name: f.name.value.trim(),
        courseId: parseInt(f.courseId.value),
        teacherId: parseInt(f.teacherId.value),
        maxStudents: parseInt(f.maxStudents.value) || 12,
        room: f.room.value.trim(),
        time: f.time.value.trim(),
        days: days,
        status: 'active',
    };
    if (!data.name || !data.time) { showToast('Nom va vaqt majburiy', 'error'); return; }
    if (id) {
        const g = getGroup(id);
        if (g) Object.assign(g, data);
        showToast('Guruh muvaffaqiyatli tahrirlandi');
    } else {
        data.id = nextId.group++;
        groups.push(data);
        showToast('Yangi guruh muvaffaqiyatli qo\'shildi');
    }
    hideModal();
    renderContent();
}

function confirmDeleteGroup(id) {
    const g = getGroup(id);
    const cnt = getGroupCount(id);
    showConfirm('Guruhni o\'chirish', `"${g.name}" guruhini o\'chirishni xohlaysizmi? Guruhda ${cnt} ta talaba bor.`, () => {
        students.filter(s => s.groupId === id).forEach(s => s.groupId = null);
        groups = groups.filter(gr => gr.id !== id);
        showToast('Guruh muvaffaqiyatli o\'chirildi');
        renderContent();
    });
}

function renderPayments() {

    if (filters.status !== 'all') filtered = filtered.filter(p => p.status === filters.status);
    if (filters.type !== 'all') filtered = filtered.filter(p => p.type === filters.type);

    const totalConfirmed = payments.filter(p => p.status === 'confirmed').reduce((a, p) => a + p.amount, 0);
    const totalPending = payments.filter(p => p.status === 'pending').reduce((a, p) => a + p.amount, 0);

    return `<div class="page-enter">

            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-100">
                <p class="text-xs text-gray-400 mb-1">Kutilmoqda</p>
                <p class="text-xl font-bold text-warning">${formatMoney(totalPending)}</p>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-100">
                <p class="text-xs text-gray-400 mb-1">Jami</p>
                <p class="text-xl font-bold text-gray-900">${formatMoney(totalConfirmed + totalPending)}</p>

                <div class="flex items-center bg-gray-50 rounded-xl px-3 py-2 border border-gray-200 flex-1 min-w-[200px]">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm mr-2"></i>
                    <input type="text" placeholder="Talaba bo'yicha qidirish..." value="${searchQuery}" oninput="searchQuery=this.value.toLowerCase();renderContent()" class="bg-transparent text-sm w-full outline-none">
                </div>
                <select onchange="filters.status=this.value;renderContent()" class="form-input bg-gray-50 rounded-xl px-3 py-2 border border-gray-200 text-sm outline-none">

                    <option value="confirmed" ${filters.status==='confirmed'?'selected':''}>Tasdiqlangan</option>
                    <option value="pending" ${filters.status==='pending'?'selected':''}>Kutilmoqda</option>
                    <option value="cancelled" ${filters.status==='cancelled'?'selected':''}>Bekor qilingan</option>
                </select>
                <select onchange="filters.type=this.value;renderContent()" class="form-input bg-gray-50 rounded-xl px-3 py-2 border border-gray-200 text-sm outline-none">
                    <option value="all" ${filters.type==='all'?'selected':''}>Barcha turlar</option>
                    <option value="cash" ${filters.type==='cash'?'selected':''}>Naqt</option>
                    <option value="card" ${filters.type==='card'?'selected':''}>Karta</option>
                    <option value="transfer" ${filters.type==='transfer'?'selected':''}>O'tkazma</option>
                </select>
            </div>
        </div>

        <!-- Jadval -->
        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-gray-100">
                            <th class="text-left py-3 px-4 font-semibold text-gray-500 text-xs uppercase">Talaba</th>
                            <th class="text-right py-3 px-4 font-semibold text-gray-500 text-xs uppercase">Summa</th>
                            <th class="text-left py-3 px-4 font-semibold text-gray-500 text-xs uppercase hidden sm:table-cell">Sana</th>
                            <th class="text-left py-3 px-4 font-semibold text-gray-500 text-xs uppercase hidden md:table-cell">Turi</th>
                            <th class="text-left py-3 px-4 font-semibold text-gray-500 text-xs uppercase">Holat</th>
                            <th class="text-center py-3 px-4 font-semibold text-gray-500 text-xs uppercase w-24">Amal</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.length === 0 ? `<tr><td colspan="6" class="py-12 text-center text-gray-400"><i class="fa-solid fa-inbox text-3xl mb-3 block"></i>To'lovlar topilmadi</td></tr>` :
                        [...filtered].sort((a,b) => b.date.localeCompare(a.date)).map(p => {
                            const s = getStudent(p.studentId);
                            return `<tr class="table-row border-b border-gray-50">
                                <td class="py-3 px-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 text-xs font-semibold flex-shrink-0">${s ? getInitials(s.name) : '??'}</div>
                                        <div>
                                            <p class="font-medium text-gray-800">${s ? s.name : 'Noma\'lum'}</p>
                                            <p class="text-xs text-gray-400 sm:hidden">${formatDate(p.date)}</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-3 px-4 text-right font-semibold text-gray-800">${formatMoney(p.amount)}</td>
                                <td class="py-3 px-4 text-gray-500 hidden sm:table-cell">${formatDate(p.date)}</td>
                                <td class="py-3 px-4 hidden md:table-cell">
                                    <span class="flex items-center gap-1.5 text-gray-500"><i class="fa-solid ${paymentTypeIcon(p.type)} text-xs"></i>${paymentTypeLabel(p.type)}</span>
                                </td>
                                <td class="py-3 px-4">${paymentStatusBadge(p.status)}</td>
                                <td class="py-3 px-4 text-center">
                                    <div class="flex items-center justify-center gap-1">
                                        ${p.status === 'pending' ? `<button onclick="confirmPayment(${p.id})" class="w-8 h-8 rounded-lg hover:bg-green-50 text-gray-400 hover:text-accent flex items-center justify-center" title="Tasdiqlash"><i class="fa-solid fa-check text-xs"></i></button>` : ''}
                                        <button onclick="confirmDeletePayment(${p.id})" class="w-8 h-8 rounded-lg hover:bg-red-50 text-gray-400 hover:text-danger flex items-center justify-center"><i class="fa-solid fa-trash text-xs"></i></button>
                                    </div>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
            <div class="px-4 py-3 border-t border-gray-100"><p class="text-xs text-gray-400">${filtered.length} ta natija</p></div>
        </div>
    </div>`;
}

function showPaymentModal(studentId) {
    const preselected = studentId || '';
    showModal(`
        <div class="p-6">
            <h2 class="text-lg font-bold mb-5">Yangi to'lov qo'shish</h2>
            <form onsubmit="savePayment(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Talaba</label>
                    <select name="studentId" required class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                        <option value="">Tanlang</option>
                        ${students.map(s => `<option value="${s.id}" ${preselected == s.id ? 'selected' : ''}>${s.name} (${s.phone})</option>`).join('')}
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Summa (so'm)</label>
                        <input name="amount" type="number" min="1000" required class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="500000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Sana</label>
                        <input name="date" type="date" value="${new Date().toISOString().split('T')[0]}" required class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">To'lov turi</label>
                        <select name="type" class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                            <option value="cash">Naqt</option>
                            <option value="card">Karta</option>
                            <option value="transfer">O'tkazma</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Holat</label>
                        <select name="status" class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                            <option value="confirmed">Tasdiqlangan</option>
                            <option value="pending">Kutilmoqda</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Izoh</label>
                    <input name="note" class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="To'lov haqida izoh...">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="hideModal()" class="flex-1 btn-secondary py-2.5 rounded-xl font-medium text-sm">Bekor qilish</button>
                    <button type="submit" class="flex-1 btn-primary py-2.5 rounded-xl font-medium text-sm">Saqlash</button>
                </div>
            </form>
        </div>
    `);
}

function showPaymentModalForStudent(studentId) {
    showPaymentModal(studentId);
}

function savePayment(e) {
    e.preventDefault();
    const f = e.target;
    const data = {
        id: nextId.payment++,
        studentId: parseInt(f.studentId.value),
        amount: parseInt(f.amount.value) || 0,
        date: f.date.value,
        type: f.type.value,
        status: f.status.value,
        note: f.note.value.trim(),
    };
    if (!data.studentId || data.amount <= 0) { showToast('Talaba va summa majburiy', 'error'); return; }
    // Balansni yangilash
    const s = getStudent(data.studentId);
    if (s && data.status === 'confirmed') s.balance += data.amount;
    payments.push(data);
    showToast('To\'lov muvaffaqiyatli qo\'shildi');
    hideModal();
    renderContent();
}

function confirmPayment(id) {
    const p = payments.find(p => p.id === id);
    if (p) {
        p.status = 'confirmed';
        const s = getStudent(p.studentId);
        if (s) s.balance += p.amount;
        showToast('To\'lov tasdiqlandi');
        renderContent();
    }
}

function confirmDeletePayment(id) {
    showConfirm('To\'lovni o\'chirish', 'Ushbu to\'lovni o\'chirishni xohlaysizmi?', () => {
        const p = payments.find(pay => pay.id === id);
        if (p && p.status === 'confirmed') {
            const s = getStudent(p.studentId);
            if (s) s.balance = Math.max(0, s.balance - p.amount);
        }
        payments = payments.filter(pay => pay.id !== id);
        showToast('To\'lov o\'chirildi');
        renderContent();
    });
}

// ===== DARS JADVALI =====
function renderSchedule() {
    const days = dayOrder.slice(0, 6);
    const hours = [];
    for (let h = 8; h <= 20; h++) hours.push(h);

    const activeGroups = groups.filter(g => g.status === 'active');

    function getGroupsForDayHour(day, hour) {
        return activeGroups.filter(g => {
            if (!g.days.includes(day)) return false;
            const startH = parseInt(g.time.split(':')[0]);
            return startH === hour;
        });
    }

    return `<div class="page-enter">
        <div class="mb-5">
            <h1 class="text-xl font-bold text-gray-900">Dars jadvali</h1>
            <p class="text-sm text-gray-400 mt-0.5">Haftalik dars jadvali</p>
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm min-w-[700px]">
                    <thead>
                        <tr class="border-b border-gray-100">
                            <th class="py-3 px-3 text-left font-semibold text-gray-500 text-xs uppercase w-20 bg-gray-50">Vaqt</th>
                            ${days.map(d => `<th class="py-3 px-2 text-center font-semibold text-gray-500 text-xs uppercase bg-gray-50">${d}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${hours.map(h => {
                            return `<tr class="border-b border-gray-50">
                                <td class="py-2 px-3 text-xs text-gray-400 font-mono bg-gray-50/50 whitespace-nowrap">${String(h).padStart(2,'0')}:00</td>
                                ${days.map(d => {
                                    const grps = getGroupsForDayHour(d, h);
                                    if (grps.length === 0) return `<td class="py-2 px-1"></td>`;
                                    return `<td class="py-2 px-1">
                                        ${grps.map(g => {
                                            const c = getCourse(g.courseId);
                                            const t = getTeacher(g.teacherId);
                                            const cnt = getGroupCount(g.id);
                                            const endH = parseInt(g.time.split('-')[1].split(':')[0]);
                                            const spanH = endH - parseInt(g.time.split(':')[0]);
                                            return `<div class="schedule-block rounded-xl p-2.5 text-white mb-1" style="background:${c ? c.color : '#666'}" onclick="showGroupDetail(${g.id})">
                                                <p class="font-bold text-xs">${g.name}</p>
                                                <p class="text-[10px] opacity-80 mt-0.5">${c ? c.name : ''}</p>
                                                <p class="text-[10px] opacity-70 mt-0.5">${t ? t.name : ''} &middot; ${g.time}</p>
                                                <p class="text-[10px] opacity-70">Xona ${g.room} &middot; ${cnt}/${g.maxStudents}</p>
                                            </div>`;
                                        }).join('')}
                                    </td>`;
                                }).join('')}
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    </div>`;
}

// ===== O'QITUVCHILAR =====
function renderTeachers() {
    return `<div class="page-enter">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5">
            <div>
                <h1 class="text-xl font-bold text-gray-900">O'qituvchilar</h1>
                <p class="text-sm text-gray-400 mt-0.5">Jami ${teachers.length} ta o'qituvchi</p>
            </div>
            <button onclick="showTeacherModal()" class="btn-primary px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 self-start">
                <i class="fa-solid fa-plus text-xs"></i> O'qituvchi qo'shish
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            ${teachers.map(t => {
                const teacherGroups = groups.filter(g => g.teacherId === t.id);
                const teacherCourses = t.courseIds.map(cid => getCourse(cid)).filter(Boolean);
                const totalStudents = teacherGroups.reduce((a, g) => a + getGroupCount(g.id), 0);
                return `<div class="bg-white rounded-2xl p-5 border border-gray-100 group-card">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-accent to-emerald-400 flex items-center justify-center text-white font-bold text-sm">${getInitials(t.name)}</div>
                            <div>
                                <h3 class="font-semibold text-gray-900">${t.name}</h3>
                                <p class="text-xs text-gray-400">${t.phone}</p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="showTeacherModal(${t.id})" class="w-7 h-7 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-accent flex items-center justify-center"><i class="fa-solid fa-pen text-[10px]"></i></button>
                            <button onclick="confirmDeleteTeacher(${t.id})" class="w-7 h-7 rounded-lg hover:bg-red-50 text-gray-400 hover:text-danger flex items-center justify-center"><i class="fa-solid fa-trash text-[10px]"></i></button>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1.5 mb-3">
                        ${teacherCourses.map(c => `<span class="text-[11px] font-medium px-2 py-0.5 rounded-md text-white" style="background:${c.color}">${c.name}</span>`).join('')}
                    </div>
                    <div class="flex items-center gap-4 pt-3 border-t border-gray-100 text-xs text-gray-500">
                        <span><i class="fa-solid fa-layer-group mr-1"></i>${teacherGroups.length} guruh</span>
                        <span><i class="fa-solid fa-users mr-1"></i>${totalStudents} talaba</span>
                        ${statusBadge(t.status)}
                    </div>
                </div>`;
            }).join('')}
        </div>
    </div>`;
}

function showTeacherModal(id) {
    const t = id ? getTeacher(id) : null;
    showModal(`
        <div class="p-6">
            <h2 class="text-lg font-bold mb-5">${t ? 'O\'qituvchini tahrirlash' : 'Yangi o\'qituvchi qo\'shish'}</h2>
            <form onsubmit="saveTeacher(event, ${id || 0})" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ism familiya</label>
                    <input name="name" value="${t ? t.name : ''}" required class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Telefon</label>
                    <input name="phone" value="${t ? t.phone : ''}" required class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="+998 90 123 45 67">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Kurslar</label>
                    <div class="flex flex-wrap gap-2">
                        ${courses.map(c => `<label class="flex items-center gap-1.5 bg-gray-50 rounded-lg px-3 py-1.5 border border-gray-200 cursor-pointer hover:bg-gray-100 text-sm">
                            <input type="checkbox" name="courseIds" value="${c.id}" ${t && t.courseIds.includes(c.id) ? 'checked' : ''} class="accent-accent">
                            ${c.name}
                        </label>`).join('')}
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Holat</label>
                    <select name="status" class="form-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                        <option value="active" ${t && t.status === 'active' ? 'selected' : ''}>Aktiv</option>
                        <option value="inactive" ${t && t.status === 'inactive' ? 'selected' : ''}>Nofaol</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="hideModal()" class="flex-1 btn-secondary py-2.5 rounded-xl font-medium text-sm">Bekor qilish</button>
                    <button type="submit" class="flex-1 btn-primary py-2.5 rounded-xl font-medium text-sm">Saqlash</button>
                </div>
            </form>
        </div>
    `);
}

function saveTeacher(e, id) {
    e.preventDefault();
    const f = e.target;
    const courseIds = [...f.querySelectorAll('input[name="courseIds"]:checked')].map(c => parseInt(c.value));
    const data = {
        name: f.name.value.trim(),
        phone: f.phone.value.trim(),
        courseIds: courseIds,
        status: f.status.value,
    };
    if (!data.name || !data.phone) { showToast('Ism va telefon majburiy', 'error'); return; }
    if (id) {
        const t = getTeacher(id);
        if (t) Object.assign(t, data);
        showToast('O\'qituvchi muvaffaqiyatli tahrirlandi');
    } else {
        data.id = nextId.teacher++;
        teachers.push(data);
        showToast('Yangi o\'qituvchi muvaffaqiyatli qo\'shildi');
    }
    hideModal();
    renderContent();
}

function confirmDeleteTeacher(id) {
    const t = getTeacher(id);
    showConfirm('O\'qituvchini o\'chirish', `"${t.name}" o\'qituvchisini o\'chirishni xohlaysizmi?`, () => {
        groups.filter(g => g.teacherId === id).forEach(g => g.teacherId = null);
        teachers = teachers.filter(te => te.id !== id);
        showToast('O\'qituvchi o\'chirildi');
        renderContent();
    });
}

// ===== ISHGA TUSHIRISH =====
function init() {
    renderSidebar();
    renderBreadcrumb();
    renderContent();
}

document.addEventListener('DOMContentLoaded', init);
</script>
